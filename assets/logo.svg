<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">HF Hub v0 to v1 Migrator</title>
  <desc id="desc">A clear project logo showing HF Hub migration from v0 to v1 with code brackets and an arrow.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="92" x2="904" y2="932" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.58" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="arrow" x1="250" y1="596" x2="774" y2="596" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="210" fill="url(#bg)"/>
  <circle cx="790" cy="214" r="118" fill="#facc15" opacity="0.18"/>
  <circle cx="215" cy="810" r="140" fill="#34d399" opacity="0.12"/>

  <g filter="url(#softShadow)">
    <rect x="156" y="138" width="712" height="748" rx="88" fill="#f8fafc"/>
    <rect x="156" y="138" width="712" height="132" rx="88" fill="#facc15"/>
    <path d="M156 226h712v44H156z" fill="#facc15"/>
  </g>

  <g fill="#111827" font-family="Arial, Helvetica, sans-serif" font-weight="900">
    <text x="512" y="234" text-anchor="middle" font-size="82" letter-spacing="2">HF HUB</text>
    <text x="512" y="440" text-anchor="middle" font-size="156" letter-spacing="-6">v0</text>
    <text x="512" y="760" text-anchor="middle" font-size="178" letter-spacing="-8">v1</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M276 578h368" stroke="url(#arrow)" stroke-width="62"/>
    <path d="M618 510l116 68-116 68" stroke="#facc15" stroke-width="62"/>
    <path d="M290 506 202 594l88 88" stroke="#111827" stroke-width="42"/>
    <path d="M734 506l88 88-88 88" stroke="#111827" stroke-width="42"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <rect x="308" y="806" width="408" height="58" rx="29" fill="#111827"/>
    <text x="512" y="849" text-anchor="middle" font-size="38" fill="#f8fafc" letter-spacing="3">CODEMOD</text>
  </g>
</svg>
